#     Secret code import and without logs and tailscale


name: System Service  # ← Generic name (not "withhout tailscale Server")

on:
  workflow_dispatch: {}  # Manual trigger only - most stealthy
  # schedule:  # Keep commented - manual runs are less suspicious
  #   - cron: "0 */12 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Setup Environment
        run: |
          # Clean previous runs
          docker system prune -af > /dev/null 2>&1 || true
          
      - name: Clone Repository
        run: |
          git clone --depth 1 https://github.com/SilentDemonSD/WZML-X.git > /dev/null 2>&1
          echo "✅ Setup complete"
          
      - name: Load Configuration
        run: |
          # Clone private config (single branch, shallow clone)
          git clone --depth 1 https://${{ secrets.G_PAT }}@github.com/moriah-zen/Network.git config_temp > /dev/null 2>&1
          
          # Copy config files
          cp -f config_temp/config.py WZML-X/config.py 2>/dev/null || true
          cp -f config_temp/.env WZML-X/.env 2>/dev/null || true
          
          # Cleanup sensitive files immediately
          rm -rf config_temp
          
      - name: Build Image
        run: |
          cd WZML-X
          docker build --no-cache -t app:latest . > /dev/null 2>&1
          
      - name: Execute Service
        run: |
          # Run with resource limits to avoid detection
          docker run -d \
            --name app-service \
            --restart no \
            --memory="2g" \
            --cpus="1.0" \
            app:latest
          
          echo "Service started at $(date '+%H:%M:%S')"
          
          # Run for 5.5 hours (leaves buffer before timeout)
          timeout 19800s docker logs -f app-service 2>&1 | grep -v "ERROR" || true
          
      - name: Cleanup
        if: always()
        run: |
          # Stop and remove container
          docker stop app-service > /dev/null 2>&1 || true
          docker rm app-service > /dev/null 2>&1 || true
          
          # Remove image
          docker rmi app:latest > /dev/null 2>&1 || true
          
          # Clean workspace
          rm -rf WZML-X
          
          # Disk cleanup
          sudo rm -rf /tmp/*
          docker system prune -af > /dev/null 2>&1 || true
